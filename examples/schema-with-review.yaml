# 含 Review 步驟的 Schema — 適合需要嚴格審核的團隊
name: with-review
version: 1
description: Full workflow with mandatory review step before implementation

artifacts:
  - id: proposal
    generates: proposal.md
    description: Change proposal
    template: proposal.md
    instruction: |
      Create a detailed proposal explaining why and what.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Delta specs with Given/When/Then scenarios
    template: spec.md
    instruction: |
      Create delta specs using Given/When/Then format.
      Include happy path and error scenarios.
    requires: [proposal]

  - id: design
    generates: design.md
    description: Technical design document
    template: design.md
    instruction: |
      Create a technical design with architecture decisions,
      sequence diagrams, and DB schema changes.
    requires: [specs]

  # 額外的 review artifact — 在 design 之後、tasks 之前
  - id: review
    generates: review.md
    description: Pre-implementation review checklist
    template: review.md
    instruction: |
      Create a review checklist based on the proposal, specs, and design.
      Evaluate:
      - Security implications
      - Performance impact
      - Test coverage plan
      - Backward compatibility
      - Deployment considerations
      Flag any concerns that need resolution before implementation.
    requires: [design]

  - id: tasks
    generates: tasks.md
    description: Implementation checklist
    template: tasks.md
    instruction: |
      Create implementation tasks incorporating review feedback.
    requires: [design, review]

apply:
  requires: [tasks]
  tracks: tasks.md
